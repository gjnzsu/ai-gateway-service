services:
  kong-ai:
    image: kong:3
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong-ai-proxy-experiment.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8101"
      DECK_OPENAI_API_KEY: ${OPENAI_API_KEY:?Set OPENAI_API_KEY before running the Kong AI Proxy experiment}
    ports:
      - "8100:8000"
      - "8101:8101"
    volumes:
      - ./kong/kong-ai-proxy-experiment.yml:/kong/declarative/kong-ai-proxy-experiment.yml:ro
