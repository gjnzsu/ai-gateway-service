_format_version: "3.0"
_transform: true

services:
  - name: ai-gateway-service
    url: http://ai-gateway-service:4000
    connect_timeout: 5000
    read_timeout: 60000
    write_timeout: 60000
    retries: 2
    routes:
      - name: ai-gateway-v1
        paths:
          - /v1
        strip_path: false
      - name: ai-gateway-health
        paths:
          - /health
        strip_path: false
      - name: ai-gateway-readiness
        paths:
          - /readiness
        strip_path: false

plugins:
  - name: correlation-id
    config:
      header_name: X-Request-ID
      generator: uuid
      echo_downstream: true
  - name: rate-limiting
    config:
      minute: 120
      policy: local
