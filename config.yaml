model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

general_settings:
  master_key: null
  database_path: null

consumer_policies:
  default:
    mode: log_only
    allowed_models:
      - gpt-4o-mini
      - deepseek-chat

  ai-market-studio:
    mode: log_only
    allowed_models:
      - gpt-4o
      - gpt-4o-mini
      - deepseek-chat

security_checks:
  mode: log_only
  prompt_injection_patterns:
    - ignore previous instructions
    - reveal system prompt
    - disregard previous instructions
  sensitive_data_patterns:
    - "(?i)api[_ -]?key\\s*[:=]\\s*[^\\s]+"
    - "(?i)authorization\\s*:\\s*bearer\\s+[^\\s]+"

reliability:
  timeout_seconds: 30
  retry:
    max_attempts: 2
    backoff_seconds: 0.1
  circuit_breaker:
    enabled: true
    failure_threshold: 2
    cooldown_seconds: 30
  fallbacks:
    gpt-4o:
      - gpt-4o-mini

environment: gke
port: 4000
