model_list:
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY

  - model_name: gpt-4o-mini
    litellm_params:
      model: openai/gpt-4o-mini
      api_key: os.environ/OPENAI_API_KEY

  - model_name: deepseek-chat
    litellm_params:
      model: deepseek/deepseek-chat
      api_key: os.environ/DEEPSEEK_API_KEY

general_settings:
  master_key: null
  database_path: null

consumer_policies:
  default:
    mode: log_only
    allowed_models:
      - gpt-4o-mini
      - deepseek-chat

  ai-market-studio:
    mode: log_only
    allowed_models:
      - gpt-4o
      - gpt-4o-mini
      - deepseek-chat

environment: gke
port: 4000
