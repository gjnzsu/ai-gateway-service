services:
  ai-gateway-service:
    build:
      context: .
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-poc-openai-key}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-poc-deepseek-key}
    ports:
      - "4000:4000"

  kong:
    image: kong:3
    depends_on:
      - ai-gateway-service
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml:/kong/declarative/kong.yml:ro
